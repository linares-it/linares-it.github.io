```
steps:
  - uses: actions/checkout@v4

  - name: Build test container
    run: |
      docker build \
        -t linares-it-quality \
        test/python

  - name: Run pip-audit
    run: |
      docker run --rm \
        -v ${{ github.workspace }}:/app \
        linares-it-quality \
        pip-audit
