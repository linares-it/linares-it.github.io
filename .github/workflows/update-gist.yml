name: Update project health data

on:
  schedule:
    - cron: '0 06 * * *' # Ejecuta todos los días a las 6:00 AM UTC

  workflow_dispatch:

jobs:
  update-gist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate real health data from GitHub API
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_USERNAME: linares-it

        run: |
          pip install requests --quiet            
          python3 scripts/update_gist.py
                   

